    function TeamApp({ team, onBack, isEditor }) {
      const [view, setView] = useState("summary");
      const [activeGame, setActiveGame] = useState(null);
      const [games, setGames] = useState([]);
      const [players, setPlayers] = useState([]);
      const [gameStats, setGameStats] = useState({});
      const [playerStats, setPlayerStats] = useState({});
      const [loading, setLoading] = useState(true);

      const loadAll = useCallback(async () => {
        setLoading(true);
        const [gRes, pRes, gsRes, psRes] = await Promise.all([
          sb.from("games").select("*").eq("team_id", team.id),
          sb.from("players").select("*").eq("team_id", team.id).order("created_at"),
          sb.from("game_stats").select("*").eq("team_id", team.id),
          sb.from("player_stats").select("*").eq("team_id", team.id),
        ]);
        const monthOrder = {"Jan":0,"Feb":1,"Mar":2,"Apr":3,"May":4,"Jun":5,"Jul":6,"Aug":7,"Sep":8,"Oct":9,"Nov":10,"Dec":11};
        const parseDate = (g) => {
          try {
            const parts = (g.date || "").trim().split(" ");
            const month = monthOrder[parts[0]];
            const day = parseInt(parts[1]);
            if (month === undefined || isNaN(day)) return 9999;
            return month * 100 + day;
          } catch { return 9999; }
        };
        const sortedGames = (gRes.data || []).sort((a,b) => parseDate(a) - parseDate(b));
        setGames(sortedGames);
        setPlayers(pRes.data || []);
        const gs = {};
        (gsRes.data || []).forEach(s => { gs[s.game_id] = s; });
        setGameStats(gs);
        const ps = {};
        (psRes.data || []).forEach(s => {
          if (!ps[s.game_id]) ps[s.game_id] = {};
          ps[s.game_id][s.player_id] = s;
        });
        setPlayerStats(ps);
        setLoading(false);
      }, [team.id]);

      useEffect(() => { loadAll(); }, [loadAll]);

      const upsertGameStat = async (gameId, fields) => {
        const existing = gameStats[gameId];
        if (existing) {
          await sb.from("game_stats").update(fields).eq("id", existing.id);
        } else {
          await sb.from("game_stats").insert({ game_id: gameId, team_id: team.id, ...fields });
        }
        const { data } = await sb.from("game_stats").select("*").eq("game_id", gameId).eq("team_id", team.id).single();
        setGameStats(prev => ({ ...prev, [gameId]: data }));
      };

      const upsertPlayerStat = async (gameId, playerId, fields) => {
        const existing = playerStats[gameId]?.[playerId];
        if (existing) {
          await sb.from("player_stats").update(fields).eq("id", existing.id);
        } else {
          await sb.from("player_stats").insert({ game_id: gameId, player_id: playerId, team_id: team.id, ...fields });
        }
        const { data } = await sb.from("player_stats").select("*").eq("game_id", gameId).eq("player_id", playerId).single();
        setPlayerStats(prev => ({ ...prev, [gameId]: { ...(prev[gameId]||{}), [playerId]: data } }));
      };

      const addPlayer = async (name, number) => {
        const { data } = await sb.from("players").insert({ team_id: team.id, name, number }).select().single();
        if (data) setPlayers(prev => [...prev, data]);
      };

      const updatePlayer = async (id, name, number) => {
        await sb.from("players").update({ name, number }).eq("id", id);
        setPlayers(prev => prev.map(p => p.id===id ? {...p, name, number} : p));
      };

      const deletePlayer = async (id) => {
        await sb.from("players").delete().eq("id", id);
        setPlayers(prev => prev.filter(p => p.id !== id));
      };

      const getGS = (gameId) => gameStats[gameId] || { score_us:"", score_them:"", clean_sheet:false, mvp:"" };
      const getPS = (gameId, playerId) => playerStats[gameId]?.[playerId] || { goals:0, assists:0, yellow_cards:0, red_cards:0, clean_sheet:false, appeared:false };

      const totals = players.map(p => {
        let goals=0, assists=0, yellowCards=0, redCards=0, mvps=0, cleanSheets=0, appearances=0;
        Object.entries(playerStats).forEach(([gid, gps]) => {
          const ps = gps[p.id];
          if (ps) { goals+=ps.goals||0; assists+=ps.assists||0; yellowCards+=ps.yellow_cards||0; redCards+=ps.red_cards||0; if(ps.clean_sheet) cleanSheets++; if(ps.appeared) appearances++; }
        });

    // 2026 FIFA World Cup Groups
    const WC_GROUPS = {

    const GROUP_MATCHES = [];

      }

    // Official 2026 FIFA World Cup Round of 32 matchups from Wikipedia/FIFA
    const R32_STRUCTURE = [

    const KNOCKOUT_MATCHES = [

      // Round of 16 - fed by R32 winners

    // Calculate group standings from match results
    function calcGroupStandings(group, matchResults) {
      const teams = WC_GROUPS[group];
      const stats = {};
      teams.forEach(t => { stats[t] = { pts:0, gf:0, ga:0, gd:0, w:0, d:0, l:0 }; });

      GROUP_MATCHES.filter(m => m.group === group).forEach(m => {
        const r = matchResults[m.id];
        if (!r || r.home_score == null) return;
        const hs = r.home_score, as_ = r.away_score;
        stats[m.home].gf += hs; stats[m.home].ga += as_; stats[m.home].gd += hs-as_;
        stats[m.away].gf += as_; stats[m.away].ga += hs; stats[m.away].gd += as_-hs;
        if (hs > as_) { stats[m.home].pts+=3; stats[m.home].w++; stats[m.away].l++; }
        else if (hs === as_) { stats[m.home].pts++; stats[m.away].pts++; stats[m.home].d++; stats[m.away].d++; }
        else { stats[m.away].pts+=3; stats[m.away].w++; stats[m.home].l++; }
      });

      return Object.entries(stats)
        .sort((a,b) => b[1].pts-a[1].pts || b[1].gd-a[1].gd || b[1].gf-a[1].gf)
        .map(([name, s]) => ({ name, ...s }));
    }

    // Resolve a slot like "W-A", "RU-B", "3rd-ABCDE" to a team name.
    // For 3rd place slots, we must allocate the 8 best 3rd-place teams across all
    // 8 third-place slots WITHOUT duplicates, respecting each slot's allowed groups.
    function getThirdPlaceAllocation(matchResults) {
      // 1. Compute 3rd place team only for groups where ALL 6 matches have results
      const thirds = [];
      Object.keys(WC_GROUPS).forEach(g => {
        const groupGameIds = GROUP_MATCHES.filter(m => m.group === g).map(m => m.id);
        const allPlayed = groupGameIds.every(id => matchResults[id]?.home_score != null);
        if (!allPlayed) return; // skip incomplete groups
        const standings = calcGroupStandings(g, matchResults);
        if (standings[2]) thirds.push({ ...standings[2], group: g });
      });

      // 2. Rank all complete 3rd place teams; take best 8 (FIFA: pts, GD, GF)
      const ranked = [...thirds].sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
      const qualified = ranked.slice(0, 8);
      const qualifiedGroups = new Set(qualified.map(t => t.group));

      // 3. The 8 slots and their allowed groups (from FIFA M74-M87)
      const slots = [
        { slotId:"R32_2", allowed:["A","B","C","D","F"] }, // M74 1E
        { slotId:"R32_5", allowed:["C","D","F","G","H"] }, // M77 1I
        { slotId:"R32_7", allowed:["C","E","F","H","I"] }, // M79 1A
        { slotId:"R32_8", allowed:["E","H","I","J","K"] }, // M80 1L
        { slotId:"R32_9", allowed:["B","E","F","I","J"] }, // M81 1D
        { slotId:"R32_10", allowed:["A","E","H","I","J"] }, // M82 1G
        { slotId:"R32_13", allowed:["E","F","G","I","J"] }, // M85 1B
        { slotId:"R32_15", allowed:["D","E","I","J","L"] }, // M87 1K
      ];

      // 4. Greedy bipartite assignment: assign qualifying groups to slots.
      // Process slots with fewest valid options first to avoid conflicts.
      const assignment = {};
      const usedGroups = new Set();
      const remainingSlots = slots.map(s => ({
        ...s,
        options: s.allowed.filter(g => qualifiedGroups.has(g))
      }));

      // iterate until all slots assigned
      let safety = 0;
      while (remainingSlots.some(s => !assignment[s.slotId]) && safety < 50) {
        safety++;
        // pick unassigned slot with fewest available options
        const open = remainingSlots
          .filter(s => !assignment[s.slotId])
          .map(s => ({ ...s, avail: s.options.filter(g => !usedGroups.has(g)) }))
          .sort((a,b) => a.avail.length - b.avail.length);
        if (open.length === 0) break;
        const slot = open[0];
        if (slot.avail.length === 0) { assignment[slot.slotId] = null; continue; }
        // assign the best-ranked available group to this slot
        const bestGroup = qualified.find(t => slot.avail.includes(t.group) && !usedGroups.has(t.group))?.group || slot.avail[0];
        assignment[slot.slotId] = bestGroup;
        usedGroups.add(bestGroup);
      }

      // 5. Map slotId -> team name
      const result = {};
      Object.entries(assignment).forEach(([slotId, group]) => {
        if (!group) { result[slotId] = "3rd Place"; return; }
        const team = thirds.find(t => t.group === group);
        result[slotId] = team?.name || "3rd Place";
      });
      return result;
    }

    function resolveSlot(slot, matchResults, slotId) {
      if (!slot.includes("-")) return slot;
      if (slot.startsWith("W-")) {
        const standings = calcGroupStandings(slot.replace("W-",""), matchResults);
        return standings[0]?.name || `1st Group ${slot.replace("W-","")}`;
      }
      if (slot.startsWith("RU-")) {
        const standings = calcGroupStandings(slot.replace("RU-",""), matchResults);
        return standings[1]?.name || `2nd Group ${slot.replace("RU-","")}`;
      }
      if (slot.startsWith("3rd-")) {
        // Need full allocation to avoid duplicate teams across slots
        const alloc = getThirdPlaceAllocation(matchResults);
        return alloc[slotId] || "3rd Place";
      }
      return slot;
    }

    // First match kickoff: June 11, 2026, 2:00 PM Central Time (UTC-5 CDT)
    const KICKOFF = new Date("2026-06-11T14:00:00-05:00");

    function WorldCupApp({ isEditor, onBack }) {

      const loadAll = useCallback(async () => {

        let allPreds = [];
